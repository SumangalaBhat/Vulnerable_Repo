name: Agentic DevSecOps Pipeline

on:
  push:
    branches: [main, dev, agentic]
  pull_request:
    branches: [main, dev, agentic]

permissions:
  contents: write
  pull-requests: write
  security-events: write
  pages: write
  id-token: write

jobs:

  # =========================
  # 🔹 Stage 1: Setup
  # =========================
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

  # =========================
  # 🔹 Stage 2: Git Info
  # =========================
  git-info:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect Git Info
        run: |
          mkdir -p git

          echo "===== Latest Commit =====" > git/git.txt
          git log -1 --pretty=format:"Author: %an%nEmail: %ae%nDate: %ad%nMessage: %s" >> git/git.txt

          echo -e "\n\n===== Changed Files =====" >> git/git.txt
          git diff --name-only HEAD~1 >> git/git.txt || echo "No previous commit" >> git/git.txt

          echo -e "\n\n===== PR Info =====" >> git/git.txt
          echo "PR Author: ${{ github.actor }}" >> git/git.txt
          echo "Branch: ${{ github.ref_name }}" >> git/git.txt

      - uses: actions/upload-artifact@v4
        with:
          name: git-data
          path: git/

  # =========================
  # 🔹 Stage 3: Code Scan
  # =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        run: |
          pip install semgrep
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Run Semgrep
        run: |
          mkdir -p code
          semgrep scan --config auto --json > code/semgrep.json || true

      - name: Convert JSON → TSV
        run: |
          jq -r '.results[]? | [.check_id, .extra.severity, .path, (.start.line|tostring), .extra.message] | @tsv' code/semgrep.json > code/code.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: code-data
          path: code/

  # =========================
  # 🔹 Stage 4: Process
  # =========================
  process:
    runs-on: ubuntu-latest
    needs: code-scan

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: code-data
          path: code

      - name: Calculate Counts
        run: |
          FILE="code/code.tsv"

          TOTAL=$(grep -c . "$FILE" 2>/dev/null || echo 0)
          HIGH=$(awk -F'\t' '$2=="ERROR"{c++} END{print c+0}' "$FILE")
          MEDIUM=$(awk -F'\t' '$2=="WARNING"{c++} END{print c+0}' "$FILE")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV

  # =========================
  # 🔹 Stage 5: Dashboard
  # =========================
  dashboard:
    runs-on: ubuntu-latest
    needs: [process, git-info]
    if: always()

    steps:
      - uses: actions/download-artifact@v4

      - name: Generate HTML
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          echo "<h2>Git Info</h2><pre>" >> $REPORT

          if [ -f git/git.txt ]; then
            cat git/git.txt >> $REPORT
          else
            echo "No Git info available" >> $REPORT
          fi
          
          echo "</pre></body></html>" >> $REPORT

          echo "<html><body>" > $REPORT
          echo "<h1>🤖 Agentic Dashboard</h1>" >> $REPORT

          echo "<h2>Summary</h2>" >> $REPORT
          echo "<table border='1'>" >> $REPORT
          echo "<tr><td>Total</td><td>${{ env.TOTAL }}</td></tr>" >> $REPORT
          echo "<tr><td>High</td><td>${{ env.HIGH }}</td></tr>" >> $REPORT
          echo "<tr><td>Medium</td><td>${{ env.MEDIUM }}</td></tr>" >> $REPORT
          echo "</table>" >> $REPORT

          echo "<h2>Code Issues</h2>" >> $REPORT
          echo "<table border='1'>" >> $REPORT
          echo "<tr><th>Rule</th><th>Severity</th><th>File</th><th>Line</th><th>Message</th></tr>" >> $REPORT

          if [ -f code/code.tsv ]; then
            while IFS=$'\t' read -r r s f l m; do
              echo "<tr><td>$r</td><td>$s</td><td>$f</td><td>$l</td><td>$m</td></tr>" >> $REPORT
            done < code/code.tsv
          fi

          echo "</table>" >> $REPORT

          echo "<h2>Git Info</h2><pre>" >> $REPORT
          cat git/git.txt >> $REPORT
          echo "</pre></body></html>" >> $REPORT

      - name: Branch Dashboard
        run: |
          BRANCH=${GITHUB_REF_NAME}
          mkdir -p public/$BRANCH
          cp public/security-report.html public/$BRANCH/index.html

      - name: Root Index
        run: |
          echo "<h1>Dashboards</h1>" > public/index.html
          echo "<a href='./${GITHUB_REF_NAME}/'>${GITHUB_REF_NAME}</a>" >> public/index.html

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Download Code Data
        uses: actions/download-artifact@v4
        with:
          name: code-data
          path: code
      
      - name: Download Git Data
        uses: actions/download-artifact@v4
        with:
          name: git-data
          path: git

  # =========================
  # 🔹 Stage 6: Deploy Pages
  # =========================
  deploy-pages:
    runs-on: ubuntu-latest
    needs: dashboard
    if: always()

    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4
