name: Agentic DevSecOps Pipeline

on:
  push:
    branches: [main, dev, agentic]
  pull_request:
    branches: [main, dev, agentic]

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:

# =========================
# 🔹 Stage 1: Checkout
# =========================
  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

# =========================
# 🔹 Stage 2: Scan (Semgrep)
# =========================
  scan:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Scan
        run: |
          mkdir -p scan
          semgrep scan --config auto --json > scan/results.json || true

# =========================
# 🔹 Stage 3: Analyze
# =========================
  analyze:
    runs-on: ubuntu-latest
    needs: scan

    outputs:
      HIGH: ${{ steps.count.outputs.high }}

    steps:
      - uses: actions/checkout@v4

      - name: Process Scan Results
        id: count
        run: |
          HIGH=$(jq '[.results[]? | select(.extra.severity=="ERROR")] | length' code/semgrep.json 2>/dev/null || echo 0)
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          mkdir -p scan
          semgrep scan --config auto --json > scan/results.json || true

          FILE="code/semgrep.json"

          CRITICAL=$(jq '[.results[]? | select(.extra.severity=="ERROR")] | length' "$FILE" 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.results[]? | select(.extra.severity=="WARNING")] | length' "$FILE" 2>/dev/null || echo 0)
          LOW=$(jq '[.results[]? | select(.extra.severity=="INFO")] | length' "$FILE" 2>/dev/null || echo 0)
          
          echo "CRITICAL=$CRITICAL" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV

# =========================
# 🔹 Stage 4: Auto Fix (Agent)
# =========================
  auto-fix:
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Agent 1: Semgrep Autofix
      - name: Semgrep Autofix
        run: |
          pip install semgrep
          semgrep scan --config auto --autofix || true

      # 🤖 Agent 2: OpenRewrite
      - name: OpenRewrite Fix (Safe)
        run: |
          echo "Running OpenRewrite..."
            mvn -B org.openrewrite.maven:rewrite-maven-plugin:run \
              -Drewrite.activeRecipes="org.openrewrite.java.security.NoHardcodedPasswords,org.openrewrite.java.security.UsePreparedStatements" \
              -Drewrite.failOnDryRunResults=false \
              || echo "OpenRewrite skipped"

      # 🤖 Agent 3: Custom Fix
      - name: Custom Fixes
        run: |
          find . -name "*.java" -type f | while read f; do
            sed -i 's/"my-super-secret-key"/System.getenv("SECRET_KEY")/g' "$f"
            sed -i 's/Runtime.getRuntime().exec/\/\/ BLOCKED_EXEC/g' "$f"
          done

# =========================
# 🔹 Stage 5: Re-test
# =========================
  retest:
    runs-on: ubuntu-latest
    needs: auto-fix
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Re-run Scan
        run: |
          pip install semgrep
          semgrep scan --config auto || true

# =========================
# 🔹 Stage 6: PR Creation
# =========================
  create-pr:
    runs-on: ubuntu-latest
    needs: auto-fix
    if: always()

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Fix Branch
        run: |
          git checkout -b auto-fix/${GITHUB_REF_NAME} || git checkout auto-fix/${GITHUB_REF_NAME}

      - name: Commit & Push (Robust)
        run: |
          git config user.name "agentic-bot"
          git config user.email "bot@ai.com"
      
          git add .
          git commit -m "🤖 Auto security fixes" || echo "No changes"
      
          BRANCH="auto-fix/${GITHUB_REF_NAME}"
      
          git fetch origin
      
          if git ls-remote --exit-code --heads origin $BRANCH; then
            echo "Branch exists → rebasing"
            git pull --rebase origin $BRANCH || true
          else
            echo "New branch → pushing"
          fi
      
          git push origin $BRANCH

      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-fix/${{ github.ref_name }}
          base: ${{ github.ref_name }}
          title: "🤖 Auto Security Fixes"
          body: |
            Auto-remediation applied using AI agents.
            Please review before merging.

# =========================
# 🔹 Stage 7: Dashboard
# =========================
  dashboard:
    runs-on: ubuntu-latest
    needs: [analyze, retest]
    if: always()

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate HTML
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          cat <<EOF > $REPORT
          <html><body>
          <h1>🚨 Agentic Security Dashboard</h1>
          <p>Branch: ${GITHUB_REF_NAME}</p>
          <p>High Issues: ${{ needs.analyze.outputs.HIGH }}</p>
          </body></html>
          EOF

      - name: Branch Folder
        run: |
          BRANCH=${GITHUB_REF_NAME}
          mkdir -p public/$BRANCH
          cp public/security-report.html public/$BRANCH/index.html

      - name: Root Index
        run: |
          echo "<h1>Dashboards</h1>" > public/index.html
          echo "<a href='./${GITHUB_REF_NAME}/'>Current Branch</a>" >> public/index.html

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

# =========================
# 🔹 Stage 8: Deploy Pages
# =========================
  deploy:
    runs-on: ubuntu-latest
    needs: dashboard
    if: always()

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/configure-pages@v5
      - uses: actions/deploy-pages@v4

# =========================
# 🔹 Stage 9: Block Merge (but continue)
# =========================
  block-merge:
    runs-on: ubuntu-latest
    needs: analyze
    if: always()

    steps:
      - name: Fail if HIGH exists
        run: |
          if [ "${{ needs.analyze.outputs.HIGH }}" -gt 0 ]; then
            echo "❌ HIGH vulnerabilities detected"
            exit 1
          fi
