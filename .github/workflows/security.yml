name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:

  # 🔹 Stage 1: Checkout and Build
  build:
    runs-on: ubuntu-latest
    outputs:
      build-success: ${{ steps.build-step.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        id: build-step
        run: mvn clean install -DskipTests

  # 🔹 Stage 2: OWASP Dependency Check
  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Check if API Key Exists
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "❌ NVD_API_KEY is NOT set"
            exit 1
          else
            echo "✅ NVD_API_KEY is set"
          fi
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

         # ✅ OWASP Dependency Check (ONLY THIS)
      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      # Print report
      - name: Print OWASP Report
        run: |
          REPORT_FILE="target/dependency-check-report/dependency-check-report.json"
          echo "========== OWASP REPORT =========="
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
          else
            echo "No report generated"
          fi

      # Count vulnerabilities
      - name: Count Vulnerabilities
        run: |
          REPORT_FILE="target/dependency-check-report/dependency-check-report.json"
          if [ -f "$REPORT_FILE" ]; then
            COUNT=$(jq '[.dependencies[].vulnerabilities | length] | add' "$REPORT_FILE")
            echo "Total vulnerabilities: $COUNT"
          else
            echo "Total vulnerabilities: 0"
          fi

      # ✅ Upload OWASP report (VISIBLE IN UI)
      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: target/dependency-check-report/

  # 🔹 SpotBugs Stage
  spotbugs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      # Upload SpotBugs report
      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml

  # 🔹 Stage 4: Custom Code Scan
  custom-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Custom Code Scan
        run: |
          echo "========== CUSTOM SCAN =========="
          echo "SQL Injection:"
          grep -R "Statement" src || true
          echo "Command Injection:"
          grep -R "Runtime.getRuntime()" src || true
          echo "Hardcoded Password:"
          grep -R "root123" . || true
          echo "Path Traversal:"
          grep -R "FileReader" src || true
