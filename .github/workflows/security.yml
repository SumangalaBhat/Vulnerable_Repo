name: DevSecOps CI Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

# 🔹 Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean install -DskipTests


# 🔹 Restore NVD Cache
  restore-nvd:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-db-*
        continue-on-error: true


# 🔹 Dependency Scan (NO API → stable)
  dependency-scan:
    runs-on: ubuntu-latest
    needs: restore-nvd

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Scan (Safe Mode)
        run: |
          mkdir -p reports
      
          echo "🔍 Starting OWASP Dependency Check..."
      
          mvn org.owasp:dependency-check-maven:check \
            -Dformat=JSON \
            -DscanSet=ALL \
            -DautoUpdate=false \
            -DfailOnError=false \
            || true
      
          echo "📦 Checking if report exists..."
      
          if [ -f target/dependency-check-report.json ]; then
            echo "✅ Report generated"
            cp target/dependency-check-report.json reports/owasp-report.json
          else
            echo "⚠️ Report NOT generated → creating fallback"
      
            echo '{"dependencies":[],"scanInfo":{"error":"OWASP scan failed"}}' > reports/owasp-report.json
          fi


# 🔹 Code Scan
  code-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p reports
          grep -RniE "password|secret|apikey|token" . > reports/code-scan.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: code-scan
          path: reports/


# 🔹 Git Info
  git-info:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - run: |
          mkdir -p reports

          COMMIT=$(git log -1 --pretty=format:"%H")
          AUTHOR=$(git log -1 --pretty=format:"%an")
          EMAIL=$(git log -1 --pretty=format:"%ae")

          echo "Commit: $COMMIT" > reports/git-info.txt
          echo "Author: $AUTHOR" >> reports/git-info.txt
          echo "Email: $EMAIL" >> reports/git-info.txt

          echo "Changed Files:" >> reports/git-info.txt
          git diff-tree --no-commit-id --name-only -r $COMMIT >> reports/git-info.txt

      - uses: actions/upload-artifact@v4
        with:
          name: git-info
          path: reports/


# 🔹 Security Gate (FAIL ON CRITICAL)
  security-gate:
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: owasp-report

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Enforce Policy
        run: |
          CRITICAL=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length' reports/owasp-report.json)

          echo "Critical vulnerabilities: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Build blocked due to critical vulnerabilities"
            exit 1
          fi


# 🔹 HTML Report (ENHANCED)
  html-report:
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, git-info]

    steps:
      - uses: actions/download-artifact@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate HTML Dashboard (CVSS + Links)
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          # 🔸 Extract CVE, Severity, CVSS, Link, Description
          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [
              .name,
              .severity,
              (.cvssv3.baseScore // .cvssv2.score // "N/A"),
              ("https://nvd.nist.gov/vuln/detail/" + .name),
              (.description | gsub("\n"; " ") | .[0:200])
            ] | @tsv
          ' owasp-report/owasp-report.json > vulns.tsv || true

          TOTAL=$(wc -l < vulns.tsv || echo 0)
          CRITICAL=$(grep -c "CRITICAL" vulns.tsv || echo 0)
          HIGH=$(grep -c "HIGH" vulns.tsv || echo 0)
          MEDIUM=$(grep -c "MEDIUM" vulns.tsv || echo 0)
          LOW=$(grep -c "LOW" vulns.tsv || echo 0)
          CODE=$(wc -l code-scan/code-scan.txt | awk '{print $1}' || echo 0)

                      cat <<EOF > $REPORT
            <html>
            <head>
            <title>DevSecOps Dashboard</title>
            <style>
            body { font-family: Arial; margin: 20px; }
            h1 { color: #2c3e50; }
            table { border-collapse: collapse; width: 85%; }
            th, td { border: 1px solid #ddd; padding: 10px; }
            th { background-color: #2c3e50; color: white; }
            tr:nth-child(even) { background-color: #f2f2f2; }
            .critical { color: red; font-weight: bold; }
            .high { color: darkorange; font-weight: bold; }
            .medium { color: orange; }
            .low { color: green; }
            a { color: blue; }
            </style>
            </head>
            <body>
            
            <h1>🚨 DevSecOps Security Dashboard</h1>
            
            <h2>📊 Summary</h2>
            <table>
            <tr><th>Type</th><th>Count</th></tr>
            <tr><td>Total</td><td>$TOTAL</td></tr>
            <tr><td>Critical</td><td class="critical">$CRITICAL</td></tr>
            <tr><td>High</td><td class="high">$HIGH</td></tr>
            <tr><td>Medium</td><td class="medium">$MEDIUM</td></tr>
            <tr><td>Low</td><td class="low">$LOW</td></tr>
            <tr><td>Code Issues</td><td>$CODE</td></tr>
            </table>
            
            <h2>📌 Vulnerability Details</h2>
            <table>
            <tr>
              <th>CVE</th>
              <th>Severity</th>
              <th>CVSS</th>
              <th>Exploit</th>
              <th>Description</th>
            </tr>
            EOF
            
                      while IFS=$'\t' read -r cve sev score link desc; do
                        CLASS=$(echo "$sev" | tr '[:upper:]' '[:lower:]')
            
                        echo "<tr>
                          <td>$cve</td>
                          <td class=\"$CLASS\">$sev</td>
                          <td>$score</td>
                          <td><a href=\"$link\" target=\"_blank\">View</a></td>
                          <td>$desc</td>
                        </tr>" >> $REPORT
                      done < vulns.tsv
            
                      cat <<EOF >> $REPORT
            </table>
            
            <h2>🧑‍💻 Git Changes</h2>
            <pre>
            $(cat git-info/git-info.txt)
            </pre>
            
            <h2>🔍 Code Scan</h2>
            <pre>
            $(cat code-scan/code-scan.txt)
            </pre>
            
            </body>
            </html>
            EOF

      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: public/

      - uses: actions/deploy-pages@v4
