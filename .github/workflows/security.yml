name: Full Security & Audit Pipeline (Real-Time HTML)

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:

# 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean install -DskipTests


# 🔹 Stage 2: Dependency Scan (REAL-TIME NVD)
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build
  
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
  
      # 🔸 Ensure dependencies are resolved
      - name: Resolve Dependencies
        run: mvn clean install -DskipTests
  
      # 🔸 Validate NVD API
      - name: Validate NVD API Key
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "❌ NVD_API_KEY missing"
            exit 1
          fi
          echo "✅ Using NVD API"
  
      # 🔸 Run OWASP Scan (STRICT)
      - name: Run OWASP Dependency Check
        run: |
          mkdir -p reports
  
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.api.key=$NVD_API_KEY \
            -Dformat=JSON \
            -DscanSet=ALL \
            -DenableExperimental=true \
            -DfailOnError=false
  
          cp target/dependency-check-report.json reports/owasp-report.json
  
      # 🔸 Install jq
      - name: Install jq
        run: sudo apt-get install -y jq
  
      # 🔸 Validate Scan Output (IMPORTANT)
      - name: Validate Vulnerability Detection
        run: |
          TOTAL=$(jq '[.dependencies[]?.vulnerabilities[]?] | length' reports/owasp-report.json)
  
          echo "Detected Vulnerabilities: $TOTAL"
  
          if [ "$TOTAL" -eq 0 ]; then
            echo "⚠️ WARNING: No vulnerabilities found."
  
            DEP_COUNT=$(jq '.dependencies | length' reports/owasp-report.json)
  
            if [ "$DEP_COUNT" -eq 0 ]; then
              echo "❌ ERROR: No dependencies scanned! Scan is invalid."
              exit 1
            fi
          fi
  
      # 🔸 Extract Proper Counts
      - name: Extract Vulnerability Metrics
        run: |
          TOTAL=$(jq '[.dependencies[]?.vulnerabilities[]?] | length' reports/owasp-report.json)
          CRITICAL=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="CRITICAL")] | length' reports/owasp-report.json)
          HIGH=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="HIGH")] | length' reports/owasp-report.json)
          MEDIUM=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="MEDIUM")] | length' reports/owasp-report.json)
          LOW=$(jq '[.dependencies[]?.vulnerabilities[]? | select(.severity=="LOW")] | length' reports/owasp-report.json)
  
          echo "TOTAL=$TOTAL"
          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"
          echo "MEDIUM=$MEDIUM"
          echo "LOW=$LOW"
  
          echo "TOTAL_VULN=$TOTAL" >> $GITHUB_ENV
          echo "CRITICAL_VULN=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH_VULN=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM_VULN=$MEDIUM" >> $GITHUB_ENV
          echo "LOW_VULN=$LOW" >> $GITHUB_ENV
  
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/


# 🔹 Stage 3: Code Scan
  code-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan Repo for Secrets
        run: |
          mkdir -p reports
          grep -RniE "password|secret|apikey|token" . > reports/code-scan.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: code-scan
          path: reports/


# 🔹 Stage 4: Git Info (Latest Change Only)
  git-info:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Latest Commit
        run: |
          mkdir -p reports
          FILE=reports/git-info.txt

          COMMIT_ID=$(git log -1 --pretty=format:"%H")
          AUTHOR=$(git log -1 --pretty=format:"%an")
          EMAIL=$(git log -1 --pretty=format:"%ae")
          MESSAGE=$(git log -1 --pretty=format:"%s")

          echo "Commit ID : $COMMIT_ID" > $FILE
          echo "Author    : $AUTHOR" >> $FILE
          echo "Email     : $EMAIL" >> $FILE
          echo "Message   : $MESSAGE" >> $FILE

          PR=$(echo "$MESSAGE" | grep -oE "#[0-9]+" | tr -d '#')
          echo "PR Number : ${PR:-N/A}" >> $FILE

          echo "" >> $FILE
          echo "Changed Files:" >> $FILE
          git diff-tree --no-commit-id --name-only -r $COMMIT_ID >> $FILE

      - uses: actions/upload-artifact@v4
        with:
          name: git-info
          path: reports/


# 🔹 Stage 5: HTML REPORT (REAL-TIME DASHBOARD)
  html-report:
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, git-info]

    steps:
      - uses: actions/download-artifact@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate Real-Time HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          # 🔸 Extract live vulnerability data
          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [.name, .severity, .description] | @tsv
          ' owasp-report/owasp-report.json > vulns.tsv || true

          TOTAL=$(wc -l < vulns.tsv || echo 0)

          CRITICAL=$(grep -c "CRITICAL" vulns.tsv || echo 0)
          HIGH=$(grep -c "HIGH" vulns.tsv || echo 0)
          MEDIUM=$(grep -c "MEDIUM" vulns.tsv || echo 0)
          LOW=$(grep -c "LOW" vulns.tsv || echo 0)

          CODE_COUNT=$(wc -l code-scan/code-scan.txt | awk '{print $1}' || echo 0)

          # 🔸 Build HTML
          cat <<EOF > $REPORT
          <html>
          <head>
          <title>Security Dashboard</title>
          <style>
          body { font-family: Arial; margin:20px; }
          table { border-collapse: collapse; width: 70%; }
          th, td { border:1px solid #ddd; padding:8px; }
          th { background:#2c3e50; color:white; }
          .high { color:red; font-weight:bold; }
          .medium { color:orange; }
          .low { color:green; }
          </style>
          </head>
          <body>
          
          <h1>🚨 Real-Time Security Dashboard</h1>
          
          <h2>📊 Summary</h2>
          <table>
          <tr><th>Type</th><th>Count</th></tr>
          <tr><td>Total Vulnerabilities</td><td class="high">$TOTAL</td></tr>
          <tr><td>Critical</td><td class="high">$CRITICAL</td></tr>
          <tr><td>High</td><td class="high">$HIGH</td></tr>
          <tr><td>Medium</td><td class="medium">$MEDIUM</td></tr>
          <tr><td>Low</td><td class="low">$LOW</td></tr>
          <tr><td>Code Issues</td><td>$CODE_COUNT</td></tr>
          </table>
          
          <h2>📌 Vulnerability Details</h2>
          <table>
          <tr><th>CVE</th><th>Severity</th><th>Description</th></tr>
          EOF
          
                    while IFS=$'\t' read -r cve sev desc; do
                      echo "<tr><td>$cve</td><td>$sev</td><td>$desc</td></tr>" >> $REPORT
                    done < vulns.tsv
          
                    cat <<EOF >> $REPORT
          </table>
          
          <h2>🧑‍💻 Latest Code Changes</h2>
          <pre>
          $(cat git-info/git-info.txt)
          </pre>
          
          <h2>🔍 Code Scan Findings</h2>
          <pre>
          $(cat code-scan/code-scan.txt)
          </pre>
          
          </body>
          </html>
          EOF

      - name: Upload HTML
        uses: actions/upload-artifact@v4
        with:
          name: security-html-report
          path: public/

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
