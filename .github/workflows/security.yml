name: DevSecOps Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write
  actions: read

jobs:

# 🔹 1. BUILD
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean install -DskipTests


# 🔹 2. OWASP SCAN
  owasp:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP
        run: |
          mkdir -p reports
          mvn org.owasp:dependency-check-maven:check \
            -Dformat=JSON \
            -DfailOnError=false || true

          if [ -f target/dependency-check-report.json ]; then
            cp target/dependency-check-report.json reports/owasp.json
          else
            echo '{"dependencies":[]}' > reports/owasp.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: owasp
          path: reports/


# 🔹 3. TRIVY SCAN
  trivy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh

      - name: Run Trivy
        run: |
          mkdir -p reports
          ./bin/trivy fs --format json -o reports/trivy.json . || true

      - uses: actions/upload-artifact@v4
        with:
          name: trivy
          path: reports/


# 🔹 4. CODEQL (REAL CODE VULNERABILITIES)
  codeql:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Init CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - run: mvn clean install -DskipTests

      - name: Analyze
        uses: github/codeql-action/analyze@v3

      - name: Extract CodeQL Results
        run: |
          mkdir -p processed
          SARIF=$(find . -name "*.sarif" | head -1)

          jq -r '
            .runs[].results[] |
            [
              .ruleId,
              .level,
              .message.text,
              .locations[0].physicalLocation.artifactLocation.uri
            ] | @tsv
          ' "$SARIF" > processed/codeql.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: codeql
          path: processed/


# 🔹 5. PROCESS (MERGE + COUNT)
  process:
    runs-on: ubuntu-latest
    needs: [owasp, trivy, codeql]

    steps:
      - uses: actions/download-artifact@v4

      - name: Install jq
        run: sudo apt-get install -y jq bc

      - name: Extract OWASP + TRIVY
        run: |
          mkdir -p processed

          # OWASP
          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [
              .name,
              ((.severity // "UNKNOWN") | ascii_upcase),
              (.cvssv3.baseScore // .cvssv2.score // 0),
              (.references[0].url // "N/A")
            ] | @tsv
          ' owasp/owasp.json > processed/owasp.tsv || true

          # TRIVY
          jq -r '
            .Results[]?.Vulnerabilities[]? |
            [
              .VulnerabilityID,
              ((.Severity // "UNKNOWN") | ascii_upcase),
              (
                .CVSS.nvd.V3Score //
                .CVSS.redhat.V3Score //
                .CVSS.ghsa.V3Score //
                0
              ),
              (.PrimaryURL // "N/A")
            ] | @tsv
          ' trivy/trivy.json > processed/trivy.tsv || true

          cat processed/owasp.tsv processed/trivy.tsv | grep -v '^$' > processed/all.tsv

      - name: Calculate Severity Counts
        run: |
          TOTAL=$(grep -c . processed/all.tsv || echo 0)

          CRITICAL=$(awk -F'\t' '($2=="CRITICAL")||($3>=9){c++}END{print c+0}' processed/all.tsv)
          HIGH=$(awk -F'\t' '($2=="HIGH")||($3>=7&&$3<9){c++}END{print c+0}' processed/all.tsv)
          MEDIUM=$(awk -F'\t' '($2=="MEDIUM")||($3>=4&&$3<7){c++}END{print c+0}' processed/all.tsv)
          LOW=$(awk -F'\t' '($2=="LOW")||($3>0&&$3<4){c++}END{print c+0}' processed/all.tsv)

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "CRITICAL=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV

      - name: Sort Vulnerabilities
        run: |
          sort -t$'\t' -k3 -nr processed/all.tsv > processed/sorted.tsv

      - uses: actions/upload-artifact@v4
        with:
          name: processed
          path: processed/

  # 🔹 5. GIT METADATA (COMMIT + PR + AUTHOR)
  git-metadata:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Needed for diff

      - name: Extract Git Details
        run: |
          mkdir -p reports

          COMMIT_ID=$(git rev-parse HEAD)
          AUTHOR=$(git log -1 --pretty=format:"%an")
          EMAIL=$(git log -1 --pretty=format:"%ae")
          MESSAGE=$(git log -1 --pretty=format:"%s")

          # PR ID (only if PR event)
          PR_ID=${{ github.event.pull_request.number || 'N/A' }}

          echo "Commit ID: $COMMIT_ID" > reports/git.txt
          echo "Author: $AUTHOR" >> reports/git.txt
          echo "Email: $EMAIL" >> reports/git.txt
          echo "Message: $MESSAGE" >> reports/git.txt
          echo "PR ID: $PR_ID" >> reports/git.txt

          echo "" >> reports/git.txt
          echo "Changed Files:" >> reports/git.txt

          git diff-tree --no-commit-id --name-only -r $COMMIT_ID >> reports/git.txt

          echo "==== GIT INFO ===="
          cat reports/git.txt

      - uses: actions/upload-artifact@v4
        with:
          name: git
          path: reports/


# 🔹 6. HTML REPORT
  html:
    runs-on: ubuntu-latest
    needs: process

    steps:
      - uses: actions/download-artifact@v4

      - name: Generate HTML
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          cat <<EOF > $REPORT
          <html>
          <head>
          <style>
          body {font-family: Arial;}
          table {border-collapse: collapse; width:100%;}
          th,td {border:1px solid black; padding:8px;}
          th {background:#333;color:white;}
          .critical {background:#ff4d4d;}
          .high {background:#ff944d;}
          .medium {background:#ffd24d;}
          .low {background:#d2ff4d;}
          </style>
          </head>
          <body>

          <h1>🚨 DevSecOps Security Report</h1>

          <h2>Summary</h2>
          <table>
          <tr><th>Total</th><th>Critical</th><th>High</th><th>Medium</th><th>Low</th></tr>
          <tr>
          <td>${{ env.TOTAL }}</td>
          <td>${{ env.CRITICAL }}</td>
          <td>${{ env.HIGH }}</td>
          <td>${{ env.MEDIUM }}</td>
          <td>${{ env.LOW }}</td>
          </tr>
          </table>

          <h2>📦 Dependency Vulnerabilities</h2>
          <table>
          <tr><th>ID</th><th>Severity</th><th>CVSS</th><th>Link</th></tr>
          EOF

          while IFS=$'\t' read -r id sev score link; do
            CLASS="low"
            [[ "$sev" == "CRITICAL" || $(echo "$score>=9"|bc) -eq 1 ]] && CLASS="critical"
            [[ "$sev" == "HIGH" ]] && CLASS="high"
            [[ "$sev" == "MEDIUM" ]] && CLASS="medium"

            echo "<tr class='$CLASS'><td>$id</td><td>$sev</td><td>$score</td><td><a href='$link'>Link</a></td></tr>" >> $REPORT
          done < processed/sorted.tsv

          echo "</table>" >> $REPORT

          echo "<h2>💻 Code Vulnerabilities (All Files)</h2>" >> $REPORT
          echo "<table><tr><th>Rule</th><th>Severity</th><th>Description</th><th>File</th></tr>" >> $REPORT

          while IFS=$'\t' read -r rule sev msg file; do
            CLASS="low"
            [[ "$sev" == "error" ]] && CLASS="critical"
            [[ "$sev" == "warning" ]] && CLASS="high"

            echo "<tr class='$CLASS'><td>$rule</td><td>$sev</td><td>$msg</td><td>$file</td></tr>" >> $REPORT
          done < codeql/codeql.tsv

          echo "<h2>🧾 Git Metadata</h2>" >> $REPORT
          echo "<pre>" >> $REPORT
          cat git/git.txt >> $REPORT
          echo "</pre>" >> $REPORT

          echo "</table>" >> $REPORT

          echo "</body></html>" >> $REPORT

      - uses: actions/upload-artifact@v4
        with:
          name: report
          path: public/
