name: Java Microservice DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:

# =========================
# 🔹 Stage 1: Build
# =========================
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Project (Safe)
        run: |
          mvn clean compile -DskipTests || true

# =========================
# 🔹 Stage 2: Dependency Scan (OWASP)
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Scan
        run: |
          mkdir -p reports

          mvn org.owasp:dependency-check-maven:check \
            -Dformat=JSON \
            -DfailOnError=false \
            || true

          if [ -f target/dependency-check-report.json ]; then
            cp target/dependency-check-report.json reports/owasp.json
          else
            echo '{"dependencies":[]}' > reports/owasp.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: owasp
          path: reports/

# =========================
# 🔹 Stage 3: Custom Code Scan (ALL FILES)
# =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan ALL files for vulnerabilities
        run: |
          mkdir -p reports

          # Scan entire repo
          grep -RniE "password\s*=|secret\s*=|apikey\s*=|token\s*=|Runtime.getRuntime|SELECT .*\\+" . > reports/code.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: code
          path: reports/

# =========================
# 🔹 Stage 4: Process Vulnerabilities
# =========================
  process:
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan]

    steps:
      - uses: actions/download-artifact@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Extract OWASP Vulnerabilities
        run: |
          mkdir -p processed

          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [
              .name,
              (.severity // "UNKNOWN"),
              (.cvssv3.baseScore // 0),
              (.references[0].url // "N/A")
            ] | @tsv
          ' owasp/owasp.json > processed/owasp.tsv || true

      - name: Count Vulnerabilities
        run: |
          mkdir -p processed
          
          # Ensure file exists
          if [ ! -f processed/owasp.tsv ]; then
            echo "" > processed/owasp.tsv
          fi
          
          # Safe counts
          TOTAL=$(grep -c . processed/owasp.tsv 2>/dev/null || true)
          
          CRITICAL=$(awk -F'\t' '($2=="CRITICAL")||($3>=9){c++} END{print c+0}' processed/owasp.tsv 2>/dev/null)
          HIGH=$(awk -F'\t' '($2=="HIGH")||($3>=7&&$3<9){c++} END{print c+0}' processed/owasp.tsv 2>/dev/null)
          MEDIUM=$(awk -F'\t' '($2=="MEDIUM")||($3>=4&&$3<7){c++} END{print c+0}' processed/owasp.tsv 2>/dev/null)
          LOW=$(awk -F'\t' '($2=="LOW")||($3>0&&$3<4){c++} END{print c+0}' processed/owasp.tsv 2>/dev/null)
          
          # Default to 0 if empty
          TOTAL=${TOTAL:-0}
          CRITICAL=${CRITICAL:-0}
          HIGH=${HIGH:-0}
          MEDIUM=${MEDIUM:-0}
          LOW=${LOW:-0}
          
          # Debug
          echo "TOTAL=$TOTAL"
          echo "CRITICAL=$CRITICAL"
          echo "HIGH=$HIGH"
          echo "MEDIUM=$MEDIUM"
          echo "LOW=$LOW"
          
          # SAFE export (very important)
          {
            echo "TOTAL=$TOTAL"
            echo "CRITICAL=$CRITICAL"
            echo "HIGH=$HIGH"
            echo "MEDIUM=$MEDIUM"
            echo "LOW=$LOW"
          } >> $GITHUB_ENV

      - name: Sort Vulnerabilities
        run: |
          sort -t$'\t' -k3 -nr processed/owasp.tsv > processed/sorted.tsv

      - uses: actions/upload-artifact@v4
        with:
          name: processed
          path: processed/

# =========================
# 🔹 Stage 5: HTML REPORT (FINAL)
# =========================
  html-report:
    runs-on: ubuntu-latest
    needs: process

    steps:
      - uses: actions/download-artifact@v4

      - name: Generate HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          CODE_COUNT=$(wc -l code/code.txt | awk '{print $1}' || echo 0)

          cat <<EOF > $REPORT
          <html>
          <head>
          <style>
          body { font-family: Arial; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid black; padding: 8px; }
          th { background: #333; color: white; }
          .critical { background: #ff4d4d; }
          .high { background: #ff944d; }
          .medium { background: #ffd24d; }
          .low { background: #d2ff4d; }
          </style>
          </head>

          <body>
          <h1>🚨 Security Dashboard</h1>

          <h2>Summary</h2>
          <table>
          <tr><th>Type</th><th>Count</th></tr>
          <tr><td>Total</td><td>${TOTAL:-0}</td></tr>
          <tr><td>Critical</td><td>${CRITICAL:-0}</td></tr>
          <tr><td>High</td><td>${HIGH:-0}</td></tr>
          <tr><td>Medium</td><td>${MEDIUM:-0}</td></tr>
          <tr><td>Low</td><td>${LOW:-0}</td></tr>
          <tr><td>Code Issues</td><td>$CODE_COUNT</td></tr>
          </table>

          <h2>📊 All Vulnerabilities (Repo-wide)</h2>
          <table>
          <tr><th>ID</th><th>Severity</th><th>CVSS</th><th>Link</th></tr>
          EOF

          if [ -f processed/sorted.tsv ]; then
            while IFS=$'\t' read -r id sev score link; do

              CLASS="low"
              [[ "$sev" == "CRITICAL" ]] && CLASS="critical"
              [[ "$sev" == "HIGH" ]] && CLASS="high"
              [[ "$sev" == "MEDIUM" ]] && CLASS="medium"

              echo "<tr class='$CLASS'>
                    <td>$id</td>
                    <td>$sev</td>
                    <td>$score</td>
                    <td><a href='$link'>Link</a></td>
                    </tr>" >> $REPORT

            done < processed/sorted.tsv
          else
            echo "<tr><td colspan='4'>No vulnerabilities found</td></tr>" >> $REPORT
          fi

          echo "</table>" >> $REPORT

          echo "<h2>💻 Code Issues (All Files)</h2><pre>" >> $REPORT
          cat code/code.txt >> $REPORT || echo "No code issues" >> $REPORT
          echo "</pre>" >> $REPORT

          echo "</body></html>" >> $REPORT

      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: public/
