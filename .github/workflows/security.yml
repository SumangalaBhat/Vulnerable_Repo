name: Full Security & Audit Pipeline

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:

  # 🔹 Stage 1: Checkout & Build
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests


  # 🔹 Stage 2: Security Scan (OWASP + NVD)
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency Check with NVD
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.api.key=$NVD_API_KEY \
            -Dformat=JSON

          mkdir -p reports
          cp target/dependency-check-report.json reports/owasp-report.json || echo "{}" > reports/owasp-report.json

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/


  # 🔹 Stage 3: Static Code Scan (Full Repo Scan)
  code-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run Full Repo Scan (Secrets / Risk Patterns)
        run: |
          mkdir -p reports

          grep -RniE "password|secret|apikey|token" . > reports/code-scan.txt || true

      - name: Upload Code Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: code-scan
          path: reports/


  # 🔹 Stage 4: Git Author & File Changes
  git-info:
   runs-on: ubuntu-latest
   needs: build
   steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # enough for latest commit diff
  
      - name: Extract Latest Commit Details
        run: |
          mkdir -p reports
          OUTPUT=reports/git-info.txt
  
          echo "==== Latest Commit Details ====" > $OUTPUT
          echo "" >> $OUTPUT
  
          # Get latest commit info
          COMMIT_ID=$(git log -1 --pretty=format:"%H")
          AUTHOR_NAME=$(git log -1 --pretty=format:"%an")
          AUTHOR_EMAIL=$(git log -1 --pretty=format:"%ae")
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
  
          echo "Commit ID : $COMMIT_ID" >> $OUTPUT
          echo "Author    : $AUTHOR_NAME" >> $OUTPUT
          echo "Email     : $AUTHOR_EMAIL" >> $OUTPUT
          echo "Message   : $COMMIT_MSG" >> $OUTPUT
  
          # Extract PR number (if exists in commit message)
          PR_NUMBER=$(echo "$COMMIT_MSG" | grep -oE "#[0-9]+" | tr -d '#' || true)
  
          if [ -n "$PR_NUMBER" ]; then
            echo "PR Number : $PR_NUMBER" >> $OUTPUT
          else
            echo "PR Number : N/A" >> $OUTPUT
          fi
  
          echo "" >> $OUTPUT
          echo "Changed Files:" >> $OUTPUT
  
          # Get only files changed in latest commit
          git diff-tree --no-commit-id --name-only -r $COMMIT_ID >> $OUTPUT
  
      - name: Upload Git Info
        uses: actions/upload-artifact@v4
        with:
          name: git-info
          path: reports/


  # 🔹 Stage 5: Aggregate + Generate HTML Report
  html-report:
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, git-info]

    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      # 🔸 Extract OWASP Vulnerabilities
      - name: Process OWASP Report
        run: |
          mkdir -p processed

          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [.name, .severity, .description] | @tsv
          ' owasp-report/owasp-report.json > processed/vulnerabilities.tsv || true

          OWASP_COUNT=$(cat processed/vulnerabilities.tsv | wc -l || echo 0)
          echo "OWASP_COUNT=$OWASP_COUNT" >> $GITHUB_ENV

      # 🔸 Count Code Scan Issues
      - name: Process Code Scan
        run: |
          CODE_COUNT=$(wc -l code-scan/code-scan.txt | awk '{print $1}' || echo 0)
          echo "CODE_COUNT=$CODE_COUNT" >> $GITHUB_ENV

      # 🔸 Generate HTML Report
      - name: Generate HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          echo "<html><head><title>Security Report</title></head><body>" > $REPORT
          echo "<h1>🔐 Full Security Report</h1>" >> $REPORT

          # Summary Table
          echo "<h2>Summary</h2>" >> $REPORT
          echo "<table border='1'>" >> $REPORT
          echo "<tr><th>Category</th><th>Count</th></tr>" >> $REPORT
          echo "<tr><td>OWASP Vulnerabilities</td><td>${{ env.OWASP_COUNT }}</td></tr>" >> $REPORT
          echo "<tr><td>Code Scan Issues</td><td>${{ env.CODE_COUNT }}</td></tr>" >> $REPORT
          echo "</table>" >> $REPORT

          # Detailed Vulnerabilities
          echo "<h2>Vulnerability Details</h2>" >> $REPORT
          echo "<table border='1'>" >> $REPORT
          echo "<tr><th>CVE</th><th>Severity</th><th>Description</th></tr>" >> $REPORT

          while IFS=$'\t' read -r cve sev desc; do
            echo "<tr><td>$cve</td><td>$sev</td><td>$desc</td></tr>" >> $REPORT
          done < processed/vulnerabilities.tsv

          echo "</table>" >> $REPORT

          # Code Scan Details
          echo "<h2>Code Scan Findings</h2><pre>" >> $REPORT
          cat code-scan/code-scan.txt >> $REPORT
          echo "</pre>" >> $REPORT

          # Git Info
          echo "<h2>Recent Changes (Authors & Files)</h2><pre>" >> $REPORT
          cat git-info/git-info.txt >> $REPORT
          echo "</pre>" >> $REPORT

          echo "</body></html>" >> $REPORT

      # 🔸 Upload HTML Report
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: security-html-report
          path: public/security-report.html
