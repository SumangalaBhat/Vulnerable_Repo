name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:

  # 🏗️ Stage 1: Build
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install $NVD_API_KEY


  # 🔍 Stage 2: Dependency Vulnerability Scan
  dependency-scan:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11
          
      - name: Debug NVD API Key
        run: |
          echo "NVD_API_KEY='$NVD_API_KEY'"
          if [ -z "$NVD_API_KEY" ]; then
            echo "❌ NVD_API_KEY is empty"
          else
            echo "✅ NVD_API_KEY is set"
          fi
      
      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Running OWASP Dependency Check..."
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.apiKey=${NVD_API_KEY:-""} \
            -Dformat=JSON \
            -DoutputDirectory=report

      - name: Print OWASP Report
        run: |
          echo "========== OWASP REPORT =========="
          cat report/dependency-check-report.json || echo "No report found"

      - name: Count Vulnerabilities
        run: |
          COUNT=$(jq '.dependencies[].vulnerabilities | length' report/dependency-check-report.json | awk '{sum+=$1} END {print sum}')
          echo "Total vulnerabilities: $COUNT"
          echo "VULN_COUNT=$COUNT" >> $GITHUB_ENV


  # 🧠 Stage 3: Static Code Analysis
  static-analysis:
    name: SpotBugs Scan
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Run SpotBugs
        run: |
          echo "Running SpotBugs..."
          mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      - name: Print SpotBugs Report
        run: |
          echo "========== SPOTBUGS REPORT =========="
          cat target/spotbugsXml.xml || echo "No report found"


  # 🧪 Stage 4: Custom Code Scan
  custom-scan:
    name: Custom Vulnerability Scan
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Custom Scan
        run: |
          echo "========== CUSTOM SCAN =========="

          echo "🔴 SQL Injection:"
          grep -R "Statement" src || true

          echo "🔴 Command Injection:"
          grep -R "Runtime.getRuntime()" src || true

          echo "🔴 Hardcoded Password:"
          grep -R "root123" . || true

          echo "🔴 Path Traversal:"
          grep -R "FileReader" src || true


  # 🚫 Stage 5: Fail Pipeline Gate
  fail-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: custom-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Re-run OWASP Count
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -Dnvd.apiKey=$NVD_API_KEY \
          -Dformat=JSON \
          -DoutputDirectory=report || true

          COUNT=$(jq '.dependencies[].vulnerabilities | length' report/dependency-check-report.json | awk '{sum+=$1} END {print sum}')

          echo "Final vulnerability count: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Vulnerabilities detected. Failing pipeline."
            exit 1
          else
            echo "✅ No vulnerabilities found"
          fi
