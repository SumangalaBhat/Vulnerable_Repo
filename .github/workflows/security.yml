name: DevSecOps Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

# 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean install -DskipTests

# 🔹 Stage 2: OWASP Scan (SAFE MODE)
  owasp-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP (Never Fail)
        run: |
          mkdir -p reports

          mvn org.owasp:dependency-check-maven:check \
            -Dformat=JSON \
            -DscanSet=ALL \
            -DautoUpdate=false \
            -DfailOnError=false \
            || true

          if [ -f target/dependency-check-report.json ]; then
            cp target/dependency-check-report.json reports/owasp.json
          else
            echo '{"dependencies":[]}' > reports/owasp.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: owasp
          path: reports/

# 🔹 Stage 3: TRIVY FALLBACK SCAN (ALWAYS WORKS)
  trivy-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (Stable)
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
      
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
      
          trivy --version

      - name: Run Trivy FS Scan
        run: |
          mkdir -p reports
          trivy fs --format json -o reports/trivy.json . || true

      - uses: actions/upload-artifact@v4
        with:
          name: trivy
          path: reports/

# 🔹 Stage 4: Code Scan
  code-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p reports
          grep -RniE "password|secret|apikey|token" . > reports/code.txt || true

      - uses: actions/upload-artifact@v4
        with:
          name: code
          path: reports/

# 🔹 Stage 5: Git Info (Latest Changes Only)
  git-info:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - run: |
          mkdir -p reports

          COMMIT=$(git log -1 --pretty=format:"%H")
          AUTHOR=$(git log -1 --pretty=format:"%an")
          EMAIL=$(git log -1 --pretty=format:"%ae")
          MSG=$(git log -1 --pretty=format:"%s")

          echo "Commit: $COMMIT" > reports/git.txt
          echo "Author: $AUTHOR" >> reports/git.txt
          echo "Email: $EMAIL" >> reports/git.txt
          echo "Message: $MSG" >> reports/git.txt

          echo "Changed Files:" >> reports/git.txt
          git diff-tree --no-commit-id --name-only -r $COMMIT >> reports/git.txt

      - uses: actions/upload-artifact@v4
        with:
          name: git
          path: reports/

# 🔹 Stage 6: Merge + Smart Parsing
  process:
    runs-on: ubuntu-latest
    needs: [owasp-scan, trivy-scan]   # 🔥 VERY IMPORTANT
  
    steps:
      - uses: actions/download-artifact@v4
  
      - name: Install jq
        run: sudo apt-get install -y jq
  
      # ✅ 👉 ADD YOUR STEP HERE
      - name: Extract Vulnerabilities (Accurate)
        run: |
          mkdir -p processed
      
          # 🔹 OWASP extraction
          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [
              .name,
              (.severity // "UNKNOWN"),
              (.cvssv3.baseScore // .cvssv2.score // 0),
              (.references[0].url // "N/A")
            ] | @tsv
          ' owasp/owasp.json > processed/owasp.tsv || true
      
          # 🔹 Trivy extraction
          jq -r '
            .Results[]?.Vulnerabilities[]? |
            [
              .VulnerabilityID,
              (.Severity // "UNKNOWN"),
              (
                .CVSS.nvd.V3Score //
                .CVSS.redhat.V3Score //
                .CVSS.ghsa.V3Score //
                0
              ),
              (.PrimaryURL // "N/A")
            ] | @tsv
          ' trivy/trivy.json > processed/trivy.tsv || true
      
          # 🔹 Merge
          cat processed/owasp.tsv processed/trivy.tsv > processed/all.tsv
      
          TOTAL=$(wc -l < processed/all.tsv || echo 0)
      
          CRITICAL=$(awk -F'\t' '($2=="CRITICAL") || ($3+0 >= 9){c++} END{print c+0}' processed/all.tsv)
          HIGH=$(awk -F'\t' '($2=="HIGH") || ($3+0 >=7 && $3+0<9){c++} END{print c+0}' processed/all.tsv)
          MEDIUM=$(awk -F'\t' '($2=="MEDIUM") || ($3+0 >=4 && $3+0<7){c++} END{print c+0}' processed/all.tsv)
          LOW=$(awk -F'\t' '($2=="LOW") || ($3+0 >0 && $3+0<4){c++} END{print c+0}' processed/all.tsv)
      
      - name: Safe Export Variables
        run: |
          # Remove any accidental invalid env lines
          sed -i '/CVE-/d' $GITHUB_ENV || true
      
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "CRITICAL=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV

      - name: Normalize + Merge Vulnerabilities
        run: |
          mkdir -p processed
      
          # 🔹 Normalize OWASP
          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [
              .name,
              ((.severity // "UNKNOWN") | ascii_upcase),
              (.cvssv3.baseScore // .cvssv2.score // 0),
              (.references[0].url // "N/A")
            ] | @tsv
          ' owasp/owasp.json > processed/owasp.tsv || true
      
          # 🔹 Normalize Trivy
          jq -r '
            .Results[]?.Vulnerabilities[]? |
            [
              .VulnerabilityID,
              ((.Severity // "UNKNOWN") | ascii_upcase),
              (
                .CVSS.nvd.V3Score //
                .CVSS.redhat.V3Score //
                .CVSS.ghsa.V3Score //
                0
              ),
              (.PrimaryURL // "N/A")
            ] | @tsv
          ' trivy/trivy.json > processed/trivy.tsv || true
      
          # 🔹 Merge + remove empty lines
          cat processed/owasp.tsv processed/trivy.tsv | grep -v '^$' > processed/all.tsv
      
          echo "==== DEBUG DATA ===="
          cat processed/all.tsv || true

      - name: Calculate Vulnerability Counts
        run: |
          TOTAL=$(wc -l < processed/all.tsv || echo 0)
      
          CRITICAL=$(awk -F'\t' '
            ($2=="CRITICAL") || ($3+0 >= 9)
            {c++} END{print c+0}
          ' processed/all.tsv)
      
          HIGH=$(awk -F'\t' '
            ($2=="HIGH") || ($3+0 >=7 && $3+0<9)
            {c++} END{print c+0}
          ' processed/all.tsv)
      
          MEDIUM=$(awk -F'\t' '
            ($2=="MEDIUM") || ($3+0 >=4 && $3+0<7)
            {c++} END{print c+0}
          ' processed/all.tsv)
      
          LOW=$(awk -F'\t' '
            ($2=="LOW") || ($3+0 >0 && $3+0<4)
            {c++} END{print c+0}
          ' processed/all.tsv)
      
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "CRITICAL=$CRITICAL" >> $GITHUB_ENV
          echo "HIGH=$HIGH" >> $GITHUB_ENV
          echo "MEDIUM=$MEDIUM" >> $GITHUB_ENV
          echo "LOW=$LOW" >> $GITHUB_ENV
      
          echo "✅ FINAL COUNTS:"
          echo "Critical=$CRITICAL High=$HIGH Medium=$MEDIUM Low=$LOW"

          - name: Sort Vulnerabilities by CVSS
            run: |
              sort -t$'\t' -k3 -nr processed/all.tsv > processed/sorted.tsv

          - name: Extract Top Critical
            run: |
              awk -F'\t' '($2=="CRITICAL") || ($3+0 >=9)' processed/sorted.tsv | head -5 > processed/top-critical.tsv
    
          - name: Upload Processed Data
            uses: actions/upload-artifact@v4
            with:
              name: processed
              path: processed/

# 🔹 Stage 7: HTML Dashboard (FINAL OUTPUT)
  html-report:
    runs-on: ubuntu-latest
    needs: [process, code-scan, git-info]

    steps:
      - uses: actions/download-artifact@v4
    
      - name: Generate HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html
      
          CODE=$(wc -l code/code.txt | awk '{print $1}' || echo 0)
      
          cat <<EOF > $REPORT
          <html>
          <head>
          <title>Security Dashboard</title>
          <style>
          body { font-family: Arial; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid black; padding: 8px; }
          th { background: #333; color: white; }
          .critical { background: #ff4d4d; }
          .high { background: #ff944d; }
          .medium { background: #ffd24d; }
          .low { background: #d2ff4d; }
          </style>
          </head>
          
          <body>
          
          <h1>🚨 DevSecOps Dashboard</h1>
          
          <h2>Summary</h2>
          <table>
          <tr><th>Type</th><th>Count</th></tr>
          <tr><td>Total</td><td>${{ env.TOTAL }}</td></tr>
          <tr><td>Critical</td><td>${{ env.CRITICAL }}</td></tr>
          <tr><td>High</td><td>${{ env.HIGH }}</td></tr>
          <tr><td>Medium</td><td>${{ env.MEDIUM }}</td></tr>
          <tr><td>Low</td><td>${{ env.LOW }}</td></tr>
          <tr><td>Code Issues</td><td>$CODE</td></tr>
          </table>
          
          <h2>🔥 Top 5 Critical Vulnerabilities</h2>
          <table>
          <tr><th>ID</th><th>Severity</th><th>CVSS</th><th>Exploit</th></tr>
          EOF
          
              while IFS=$'\t' read -r id sev score link; do
                echo "<tr class='critical'><td>$id</td><td>$sev</td><td>$score</td><td><a href='$link'>Link</a></td></tr>" >> $REPORT
              done < processed/top-critical.tsv
          
              cat <<EOF >> $REPORT
          </table>
          
          <h2>📊 All Vulnerabilities (Sorted by CVSS)</h2>
          <table>
          <tr><th>ID</th><th>Severity</th><th>CVSS</th><th>Exploit</th></tr>
          EOF
          
              while IFS=$'\t' read -r id sev score link; do
          
                CLASS="low"
                if [[ "$sev" == "CRITICAL" || $(echo "$score >= 9" | bc) -eq 1 ]]; then CLASS="critical"; fi
                if [[ "$sev" == "HIGH" ]]; then CLASS="high"; fi
                if [[ "$sev" == "MEDIUM" ]]; then CLASS="medium"; fi
          
                echo "<tr class='$CLASS'><td>$id</td><td>$sev</td><td>$score</td><td><a href='$link'>Link</a></td></tr>" >> $REPORT
          
              done < processed/sorted.tsv
          
              cat <<EOF >> $REPORT
          </table>
          
          <h2>Git Changes</h2>
          <pre>$(cat git/git.txt)</pre>
          
          <h2>Code Issues</h2>
          <pre>$(cat code/code.txt)</pre>
          
          </body>
          </html>
          EOF

      - uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: public/
