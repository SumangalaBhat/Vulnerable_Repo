name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:

  # -----------------------------
  # Stage 1: Build
  # -----------------------------
  build:
    name: Build Stage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests


  # -----------------------------
  # Stage 2: OWASP Dependency Scan
  # -----------------------------
  dependency-scan:
    name: OWASP Dependency Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # 🔹 Debug NVD API Key
      - name: Debug NVD API Key
        run: |
          echo "NVD_API_KEY='$NVD_API_KEY'"
          if [ -z "$NVD_API_KEY" ]; then
            echo "❌ NVD_API_KEY is empty"
          else
            echo "✅ NVD_API_KEY is set"
          fi

      # 🔹 Run OWASP Dependency Check safely
      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Running OWASP Dependency Check..."
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.apiKey=${NVD_API_KEY:-""} \
            -Dformat=JSON \
            -DoutputDirectory=report || true

      - name: Print OWASP Report
        run: |
          echo "========== OWASP REPORT =========="
          cat report/dependency-check-report.json || echo "No report found"

      - name: Count Vulnerabilities
        run: |
          COUNT=$(jq '.dependencies[].vulnerabilities | length' report/dependency-check-report.json | awk '{sum+=$1} END {print sum}')
          echo "Total vulnerabilities: $COUNT"
          echo "VULN_COUNT=$COUNT" >> $GITHUB_ENV


  # -----------------------------
  # Stage 3: SpotBugs Static Analysis
  # -----------------------------
  static-analysis:
    name: SpotBugs Scan
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Run SpotBugs
        run: |
          echo "Running SpotBugs..."
          mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      - name: Print SpotBugs Report
        run: |
          echo "========== SPOTBUGS REPORT =========="
          cat target/spotbugsXml.xml || echo "No report found"


  # -----------------------------
  # Stage 4: Custom Code Scan
  # -----------------------------
  custom-scan:
    name: Custom Vulnerability Scan
    runs-on: ubuntu-latest
    needs: static-analysis

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Custom Scan
        run: |
          echo "========== CUSTOM SCAN =========="

          echo "🔴 SQL Injection:"
          grep -R "Statement" src || echo "None found"

          echo "🔴 Command Injection:"
          grep -R "Runtime.getRuntime()" src || echo "None found"

          echo "🔴 Hardcoded Password:"
          grep -R "root123" . || echo "None found"

          echo "🔴 Path Traversal:"
          grep -R "FileReader" src || echo "None found"


  # -----------------------------
  # Stage 5: Security Fail Gate
  # -----------------------------
  fail-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: custom-scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Re-run OWASP Count
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Validating final vulnerability count..."
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.apiKey=${NVD_API_KEY:-""} \
            -Dformat=JSON \
            -DoutputDirectory=report || true

          COUNT=$(jq '.dependencies[].vulnerabilities | length' report/dependency-check-report.json | awk '{sum+=$1} END {print sum}')
          echo "Total vulnerabilities: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Vulnerabilities detected. Failing pipeline."
            exit 1
          else
            echo "✅ No vulnerabilities found. Pipeline passed."
