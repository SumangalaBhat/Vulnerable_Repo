name: Java Security Pipeline (Child Pipeline)

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:

  # 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests

  # 🔹 Stage 2: Security Scans
  security-scans:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        scan: [owasp, spotbugs]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # 🔸 OWASP Dependency Check with NVD API
      - name: Run OWASP Dependency Check
        if: matrix.scan == 'owasp'
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -Dnvd.api.key=$NVD_API_KEY \
            -Dformat=JSON

          mkdir -p reports
          cp target/dependency-check-report.json reports/owasp-report.json || echo "{}" > reports/owasp-report.json

      # 🔸 SpotBugs Scan
      - name: Run SpotBugs
        if: matrix.scan == 'spotbugs'
        run: |
          mvn clean install -DskipTests
          mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

          mkdir -p reports
          cp target/spotbugsXml.xml reports/spotbugs-report.xml || echo "<empty/>" > reports/spotbugs-report.xml

      # 🔸 Upload Scan Reports
      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scan }}
          path: reports/

  # 🔹 Stage 3: Git Metadata Collection
  git-metadata:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Collect Recent Commit Details
        run: |
          mkdir -p reports

          echo "Author | Email | Files Changed" > reports/git-log.txt
          echo "----------------------------------------" >> reports/git-log.txt

          git log -5 --pretty=format:"%an | %ae" --name-only >> reports/git-log.txt

      - name: Upload Git Metadata
        uses: actions/upload-artifact@v4
        with:
          name: git-metadata
          path: reports/

  # 🔹 Stage 4: HTML Report Aggregation
  html-report:
    runs-on: ubuntu-latest
    needs: [security-scans, git-metadata]

    steps:
      - uses: actions/checkout@v4

      - name: Download All Reports
        uses: actions/download-artifact@v4

      # 🔸 Install jq for JSON parsing
      - name: Install jq
        run: sudo apt-get install -y jq

      # 🔸 Process OWASP Data
      - name: Extract Vulnerabilities
        run: |
          mkdir -p processed

          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [.name, .severity, .description] | @tsv
          ' owasp/owasp-report.json > processed/vuln-details.tsv || true

          OWASP_COUNT=$(cat processed/vuln-details.tsv | wc -l || echo 0)
          echo "OWASP_COUNT=$OWASP_COUNT" >> $GITHUB_ENV

      # 🔸 Process SpotBugs
      - name: Extract SpotBugs Issues
        run: |
          SPOTBUGS_COUNT=$(grep -c "<BugInstance" spotbugs/spotbugs-report.xml || echo 0)
          echo "SPOTBUGS_COUNT=$SPOTBUGS_COUNT" >> $GITHUB_ENV

      # 🔸 Generate HTML Report
      - name: Generate HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          echo "<html><head><title>Security Dashboard</title></head><body>" > $REPORT
          echo "<h1>🚨 Security Dashboard</h1>" >> $REPORT

          # Summary Table
          echo "<h2>Summary</h2>" >> $REPORT
          echo "<table border='1'>" >> $REPORT
          echo "<tr><th>Scan Type</th><th>Count</th></tr>" >> $REPORT
          echo "<tr><td>OWASP Vulnerabilities</td><td>${{ env.OWASP_COUNT }}</td></tr>" >> $REPORT
          echo "<tr><td>SpotBugs Issues</td><td>${{ env.SPOTBUGS_COUNT }}</td></tr>" >> $REPORT
          echo "</table>" >> $REPORT

          # Vulnerability Details
          echo "<h2>Vulnerability Details</h2>" >> $REPORT
          echo "<table border='1'>" >> $REPORT
          echo "<tr><th>CVE</th><th>Severity</th><th>Description</th></tr>" >> $REPORT

          while IFS=$'\t' read -r cve sev desc; do
            echo "<tr><td>$cve</td><td>$sev</td><td>$desc</td></tr>" >> $REPORT
          done < processed/vuln-details.tsv

          echo "</table>" >> $REPORT

          # Git Metadata
          echo "<h2>Recent Code Changes</h2><pre>" >> $REPORT
          cat git-metadata/git-log.txt >> $REPORT
          echo "</pre>" >> $REPORT

          echo "</body></html>" >> $REPORT

      # 🔸 Upload HTML Artifact
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: security-html-report
          path: public/security-report.html

      # 🔸 Deploy to GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show URL
        run: |
          echo "🌐 Report URL:"
          echo "${{ steps.deployment.outputs.page_url }}/security-report.html"
