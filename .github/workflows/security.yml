name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🔹 Step 2: Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      # 🔹 Step 3: Build project
      - name: Build Project
        run: mvn clean install -DskipTests

      # 🔹 Step 4: OWASP Dependency Check (fail-safe)
      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          echo "Running OWASP Dependency Check..."
          mvn org.owasp:dependency-check-maven:check \
              -DfailBuildOnCVSS=0 \
              -DskipAssembly=true \
              -DdataDirectory=dependency-check-data || true

      # 🔹 Step 5: Print Dependency Check Report
      - name: Print Dependency Check Report
        run: |
          echo "========== OWASP REPORT =========="
          REPORT_FILE="target/dependency-check-report/dependency-check-report.json"
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
          else
            echo "No report generated (NVD feed unreachable)"
          fi

      # 🔹 Step 6: Count OWASP Vulnerabilities
      - name: Count Vulnerabilities
        run: |
          REPORT_FILE="target/dependency-check-report/dependency-check-report.json"
          if [ -f "$REPORT_FILE" ]; then
            COUNT=$(jq '.dependencies[].vulnerabilities | length' "$REPORT_FILE" | awk '{sum+=$1} END {print sum}')
            echo "Total vulnerabilities: $COUNT"
          else
            echo "Total vulnerabilities: 0"
          fi

      # 🔹 Step 7: Run SpotBugs
      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      # 🔹 Step 8: Print SpotBugs Report
      - name: Print SpotBugs Report
        run: |
          REPORT_FILE="target/spotbugsXml.xml"
          echo "========== SPOTBUGS REPORT =========="
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
          else
            echo "No report generated"
          fi

      # 🔹 Step 9: Custom code scan
      - name: Custom Code Scan
        run: |
          echo "========== CUSTOM SCAN =========="
          echo "SQL Injection:"
          grep -R "Statement" src || true
          echo "Command Injection:"
          grep -R "Runtime.getRuntime()" src || true
          echo "Hardcoded Password:"
          grep -R "root123" . || true
          echo "Path Traversal:"
          grep -R "FileReader" src || true
