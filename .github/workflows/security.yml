name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:

  # 🔹 Stage 1: Checkout and Build
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Step 3: Build
      - name: Build Project
        run: mvn clean install -DskipTests

  # 🔹 Stage 2: OWASP Dependency Check
  dependency-check:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Validate NVD API Key
        run: |
          if [ -z "$NVD_API_KEY" ]; then
            echo "❌ NVD_API_KEY is NOT set"
            exit 1
          else
            echo "✅ NVD_API_KEY is set"
          fi
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Save OWASP Report
        run: |
          mkdir -p reports
          if [ -f target/dependency-check-report/dependency-check-report.json ]; then
            cp target/dependency-check-report/dependency-check-report.json reports/owasp-report.json
          else
            echo "{}" > reports/owasp-report.json
          fi

      - name: Upload OWASP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-report
          path: reports/owasp-report.json

  # 🔹 Stage 3: SpotBugs (Code Issues)
  spotbugs:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      - name: Save SpotBugs Report
        run: |
          mkdir -p reports
          if [ -f target/spotbugsXml.xml ]; then
            cp target/spotbugsXml.xml reports/spotbugs-report.xml
          else
            echo "<empty/>" > reports/spotbugs-report.xml
          fi

      - name: Upload SpotBugs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: reports/spotbugs-report.xml

  # 🔹 Stage 4: Custom Code Vulnerability Scan
  custom-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Custom Code Scan
        run: |
          mkdir -p reports
          REPORT=reports/custom-scan-report.txt

          echo "========== CUSTOM CODE SCAN ==========" > $REPORT

          echo "\n[SQL Injection Patterns]" >> $REPORT
          grep -R "Statement" src >> $REPORT || true

          echo "\n[Command Injection Patterns]" >> $REPORT
          grep -R "Runtime.getRuntime()" src >> $REPORT || true

          echo "\n[Hardcoded Credentials]" >> $REPORT
          grep -R "password" . >> $REPORT || true

          echo "\n[Path Traversal]" >> $REPORT
          grep -R "FileReader" src >> $REPORT || true

      - name: Upload Custom Scan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom-code-scan-report
          path: reports/custom-scan-report.txt

  # 🔹 Stage 5: Combined Vulnerability Report
  final-report:
    runs-on: ubuntu-latest
    needs: [dependency-check, spotbugs, custom-scan]

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Combined Report
        run: |
          mkdir -p final-report
          REPORT=final-report/security-summary.txt

          echo "========== FINAL SECURITY REPORT ==========" > $REPORT

          echo "\n--- OWASP Dependency Report ---" >> $REPORT
          cat owasp-dependency-report/owasp-report.json >> $REPORT || true

          echo "\n--- SpotBugs Report ---" >> $REPORT
          cat spotbugs-report/spotbugs-report.xml >> $REPORT || true

          echo "\n--- Custom Code Scan ---" >> $REPORT
          cat custom-code-scan-report/custom-scan-report.txt >> $REPORT || true

      - name: Upload Final Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-security-report
          path: final-report/security-summary.txt


  # 🔹 Stage 5: HTML Security Dashboard
  final-report-html:
    runs-on: ubuntu-latest
    needs: [dependency-check, spotbugs, custom-scan,final-report]

    steps:
      # Step 1: Download all artifacts
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      # Step 2: Generate HTML Dashboard
      - name: Generate HTML Report
        run: |
          mkdir -p final-report
          REPORT=final-report/security-report.html

          echo "<html><head><title>Security Report</title>" > $REPORT
          echo "<style>
          body { font-family: Arial; margin: 20px; }
          h1 { color: #2c3e50; }
          h2 { color: #e74c3c; }
          pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
          </style></head><body>" >> $REPORT

          echo "<h1>🚨 Security Dashboard</h1>" >> $REPORT

          # OWASP Section
          echo "<h2>OWASP Dependency Vulnerabilities</h2><pre>" >> $REPORT
          cat owasp-dependency-report/owasp-report.json >> $REPORT || echo "No OWASP data" >> $REPORT
          echo "</pre>" >> $REPORT

          # SpotBugs Section
          echo "<h2>SpotBugs Findings</h2><pre>" >> $REPORT
          cat spotbugs-report/spotbugs-report.xml >> $REPORT || echo "No SpotBugs data" >> $REPORT
          echo "</pre>" >> $REPORT

          # Custom Scan Section
          echo "<h2>Custom Code Scan</h2><pre>" >> $REPORT
          cat custom-code-scan-report/custom-scan-report.txt >> $REPORT || echo "No custom scan data" >> $REPORT
          echo "</pre>" >> $REPORT

          echo "</body></html>" >> $REPORT

      # Step 3: Upload HTML Dashboard
      - name: Upload HTML Security Report
        uses: actions/upload-artifact@v4
        with:
          name: security-html-dashboard
          path: final-report/security-report.html
