name: DevSecOps Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

# =========================
# 🔹 Stage 1: Checkout
# =========================
  checkout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

# =========================
# 🔹 Stage 2: Build ALL Java Services
# =========================
  build:
    runs-on: ubuntu-latest
    needs: checkout

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build All Maven Projects
        run: |
          echo "🔍 Finding all pom.xml files..."
          POMS=$(find . -name "pom.xml")

          if [ -z "$POMS" ]; then
            echo "⚠️ No Maven projects found"
          fi

          for POM in $POMS; do
            DIR=$(dirname "$POM")
            echo "📦 Building project in $DIR"
            cd "$DIR"
            mvn -B clean package -DskipTests || true
            cd -
          done

# =========================
# 🔹 Stage 3: Dependency Scan (OWASP)
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Run OWASP Scan (safe)
        run: |
          mkdir -p reports

          mvn org.owasp:dependency-check-maven:check \
            -Dformat=JSON \
            -DfailOnError=false \
            -DautoUpdate=false || true

          if [ -f target/dependency-check-report.json ]; then
            cp target/dependency-check-report.json reports/owasp.json
          else
            echo '{"dependencies":[]}' > reports/owasp.json
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: owasp
          path: reports/

# =========================
# 🔹 Stage 4: Code Scan (ALL FILES)
# =========================
  code-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Scan ALL repo files
        run: |
          mkdir -p reports
          
          echo "🔍 Scanning ALL files..."
          
          # Format: RULE | SEVERITY | FILE | LINE | CODE
          
          grep -RniE "password|secret|apikey|token|exec\(|SELECT .* \+" . | while read line; do
          
            FILE=$(echo "$line" | cut -d: -f1)
            LINE=$(echo "$line" | cut -d: -f2)
            CODE=$(echo "$line" | cut -d: -f3-)
          
         
            # 🔴 HIGH Severity
            if echo "$CODE" | grep -qiE "password\s*=|secret\s*=|apikey\s*=|token\s*="; then
              RULE="Hardcoded Secret"
              SEVERITY="HIGH"
          
            elif echo "$CODE" | grep -qi "Runtime.getRuntime().exec"; then
              RULE="Command Injection Risk"
              SEVERITY="HIGH"
          
            # 🟠 MEDIUM Severity
            elif echo "$CODE" | grep -qiE "SELECT .* \+"; then
              RULE="SQL Injection Risk"
              SEVERITY="MEDIUM"
          
            elif echo "$CODE" | grep -qiE "password|secret|apikey|token"; then
              RULE="Sensitive Data Exposure"
              SEVERITY="MEDIUM"
          
            # 🟢 LOW Severity
            else
              RULE="General Code Smell"
              SEVERITY="LOW"
            fi
          
            echo -e "$RULE\t$SEVERITY\t$FILE\t$LINE\t$CODE"
          
          done > reports/code.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: code
          path: reports/code.tsv

# =========================
# 🔹 Stage 5: Git Info (Commit + PR + Author)
# =========================
  git-info:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract Git Details
        run: |
          mkdir -p reports

          COMMIT=$(git log -1 --pretty=format:"%H")
          AUTHOR=$(git log -1 --pretty=format:"%an")
          EMAIL=$(git log -1 --pretty=format:"%ae")
          MESSAGE=$(git log -1 --pretty=format:"%s")

          echo "Commit ID: $COMMIT" > reports/git.txt
          echo "Author: $AUTHOR" >> reports/git.txt
          echo "Email: $EMAIL" >> reports/git.txt
          echo "Message: $MESSAGE" >> reports/git.txt

          echo "Changed Files:" >> reports/git.txt
          git diff-tree --no-commit-id --name-only -r $COMMIT >> reports/git.txt

          echo "PR Number: ${{ github.event.pull_request.number || 'N/A' }}" >> reports/git.txt

      - uses: actions/upload-artifact@v4
        with:
          name: git
          path: reports/

# =========================
# 🔹 Stage 6: Process + Count Vulnerabilities
# =========================
  process:
    runs-on: ubuntu-latest
    needs: dependency-scan

    steps:
      - uses: actions/download-artifact@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Extract Vulnerabilities
        run: |
          mkdir -p processed

          jq -r '
            .dependencies[]?.vulnerabilities[]? |
            [
              .name,
              (.severity // "UNKNOWN"),
              (.cvssv3.baseScore // .cvssv2.score // 0),
              (.references[0].url // "N/A")
            ] | @tsv
          ' owasp/owasp.json > processed/all.tsv || true

      - name: Count Severity (SAFE)
        run: |
              FILE="processed/all.tsv"
                if [ ! -f "$FILE" ]; then
                  echo "⚠️ File not found, creating empty file"
                  mkdir -p processed
                  touch "$FILE"
                fi
                TOTAL=$(grep -c . "$FILE" 2>/dev/null || true)
                CRITICAL=$(awk -F'\t' '($2=="CRITICAL"){c++} END{print c+0}' "$FILE" 2>/dev/null)
                HIGH=$(awk -F'\t' '($2=="HIGH"){c++} END{print c+0}' "$FILE" 2>/dev/null)
                MEDIUM=$(awk -F'\t' '($2=="MEDIUM"){c++} END{print c+0}' "$FILE" 2>/dev/null)
                LOW=$(awk -F'\t' '($2=="LOW"){c++} END{print c+0}' "$FILE" 2>/dev/null)         
                TOTAL=${TOTAL:-0}
                CRITICAL=${CRITICAL:-0}
                HIGH=${HIGH:-0}
                MEDIUM=${MEDIUM:-0}
                LOW=${LOW:-0}
                TOTAL=$(echo "$TOTAL" | tr -d '[:space:]')
                CRITICAL=$(echo "$CRITICAL" | tr -d '[:space:]')
                HIGH=$(echo "$HIGH" | tr -d '[:space:]')
                MEDIUM=$(echo "$MEDIUM" | tr -d '[:space:]')
                LOW=$(echo "$LOW" | tr -d '[:space:]')
                echo "DEBUG COUNTS:"
                echo "TOTAL=$TOTAL"
                echo "CRITICAL=$CRITICAL"
                echo "HIGH=$HIGH"
                echo "MEDIUM=$MEDIUM"
                echo "LOW=$LOW"
                {
                  echo "TOTAL=$TOTAL"
                  echo "CRITICAL=$CRITICAL"
                  echo "HIGH=$HIGH"
                  echo "MEDIUM=$MEDIUM"
                  echo "LOW=$LOW"
                } >> "$GITHUB_ENV"

      - name: Sort Data
        run: |
          sort -t$'\t' -k3 -nr processed/all.tsv > processed/sorted.tsv || true

      - uses: actions/upload-artifact@v4
        with:
          name: processed
          path: processed/

# =========================
# 🔹 Stage 7: Generate HTML Report
# =========================
  html-report:
    runs-on: ubuntu-latest
    needs: [process, code-scan, git-info]
  
    steps:
      - uses: actions/download-artifact@v4
  
      - name: Generate HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html
  
          # ✅ Safe code count
          CODE_COUNT=$(wc -l code/code.tsv 2>/dev/null | awk '{print $1}')
          CODE_COUNT=${CODE_COUNT:-0}
  
          # =========================
          # ✅ START HTML (WRITE ONCE)
          # =========================
          cat <<EOF > $REPORT
          <html>
          <head>
          <title>Security Report</title>
          <style>
          body { font-family: Arial; }
          table { border-collapse: collapse; width:100%; }
          th,td { border:1px solid black; padding:8px; }
          th { background:#333; color:white; }
          .critical {background:#ff4d4d;}
          .high {background:#ff944d;}
          .medium {background:#ffd24d;}
          .low {background:#d2ff4d;}
          </style>
          </head>
          <body>
  
          <h1>🚨 DevSecOps Security Report</h1>
  
          <h2>Summary</h2>
          <table>
          <tr><td>Total</td><td>${{ env.TOTAL }}</td></tr>
          <tr><td>Critical</td><td>${{ env.CRITICAL }}</td></tr>
          <tr><td>High</td><td>${{ env.HIGH }}</td></tr>
          <tr><td>Medium</td><td>${{ env.MEDIUM }}</td></tr>
          <tr><td>Low</td><td>${{ env.LOW }}</td></tr>
          <tr><td>Code Issues</td><td>$CODE_COUNT</td></tr>
          </table>
  
          <h2>📊 Dependency Vulnerabilities</h2>
          <table>
          <tr><th>ID</th><th>Severity</th><th>CVSS</th><th>Link</th></tr>
          EOF
  
          # =========================
          # ✅ Dependency Data
          # =========================
          if [ -f processed/sorted.tsv ]; then
            while IFS=$'\t' read -r id sev score link; do
  
              CLASS="low"
              [[ "$sev" == "CRITICAL" ]] && CLASS="critical"
              [[ "$sev" == "HIGH" ]] && CLASS="high"
              [[ "$sev" == "MEDIUM" ]] && CLASS="medium"
  
              echo "<tr class='$CLASS'>
                <td>$id</td>
                <td>$sev</td>
                <td>$score</td>
                <td><a href='$link'>Link</a></td>
              </tr>" >> $REPORT
  
            done < processed/sorted.tsv
          else
            echo "<tr><td colspan='4'>No dependency vulnerabilities found</td></tr>" >> $REPORT
          fi
  
          echo "</table>" >> $REPORT
  
          # =========================
          # ✅ Code Vulnerabilities
          # =========================
          echo "<h2>💻 Code Vulnerabilities (All Files)</h2>" >> $REPORT
          echo "<table>" >> $REPORT
          echo "<tr><th>Rule</th><th>Severity</th><th>File</th><th>Line</th><th>Code</th></tr>" >> $REPORT
  
          if [ -f code/code.tsv ]; then
  
            while IFS=$'\t' read -r rule sev file line code; do
  
              CLASS="low"
              [[ "$sev" == "CRITICAL" ]] && CLASS="critical"
              [[ "$sev" == "HIGH" ]] && CLASS="high"
              [[ "$sev" == "MEDIUM" ]] && CLASS="medium"
  
              echo "<tr class='$CLASS'>
                <td>$rule</td>
                <td>$sev</td>
                <td>$file</td>
                <td>$line</td>
                <td><pre>$code</pre></td>
              </tr>" >> $REPORT
  
            done < code/code.tsv
  
          else
            echo "<tr><td colspan='5'>No code vulnerabilities found</td></tr>" >> $REPORT
          fi
  
          echo "</table>" >> $REPORT
  
          # =========================
          # ✅ Git Info
          # =========================
          echo "<h2>📌 Git Changes</h2><pre>" >> $REPORT
  
          if [ -f git/git.txt ]; then
            cat git/git.txt >> $REPORT
          else
            echo "No git info available" >> $REPORT
          fi
  
          echo "</pre>" >> $REPORT
  
          # =========================
          # ✅ END HTML
          # =========================
          echo "</body></html>" >> $REPORT
  
      - uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: public/


  # =========================
  # 🔹 Stage 8: Deploy to GitHub Pages
  # =========================
  deploy-pages:
    runs-on: ubuntu-latest
    needs: [process, code-scan, git-info,html-report]
  
    permissions:
      pages: write
      id-token: write
  
    steps:
      - name: Download Report
        uses: actions/download-artifact@v4
        with:
          name: security-dashboard
          path: artifacts
      
      - name: Prepare index.html (FIXED)
        run: |
          REPORT_FILE=$(find artifacts -name "security-report.html" | head -1)
      
          mkdir -p public
      
          if [ ! -z "$REPORT_FILE" ]; then
            cp "$REPORT_FILE" public/index.html
          else
            echo "<h1>No report generated</h1>" > public/index.html
          fi
    
  
      - name: Setup Pages
        uses: actions/configure-pages@v5
  
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
  
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  
      # ✅ FIXED URL LOGIC
      - name: Print Dashboard URL
        run: |
          BASE_URL="${{ steps.deployment.outputs.page_url }}"
          BRANCH="${GITHUB_REF_NAME}"
  
          echo "🌐 Base URL:"
          echo "$BASE_URL"
  
          if [ "$BRANCH" = "main" ]; then
            echo "✅ Main Dashboard:"
            echo "$BASE_URL"
          else
            echo "🌿 Branch Dashboard:"
            echo "$BASE_URL$BRANCH/"
          fi
