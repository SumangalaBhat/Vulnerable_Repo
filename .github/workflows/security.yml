name: Java Security Pipeline (Child Pipeline)

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
      - run: mvn clean install -DskipTests

  # 🔹 Stage 2: Security Scans (Parallel Child Jobs)
  security-scans:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        scan: [owasp, spotbugs, fullscan]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        if: matrix.scan != 'fullscan'
        with:
          distribution: temurin
          java-version: 11

      - name: Run OWASP
        if: matrix.scan == 'owasp'
        run: |
          mvn org.owasp:dependency-check-maven:check
          mkdir -p reports
          cp target/dependency-check-report/dependency-check-report.json reports/owasp-report.json || echo "{}" > reports/owasp-report.json

      - name: Run SpotBugs
        if: matrix.scan == 'spotbugs'
        run: |
          mvn clean install -DskipTests
          mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true
          mkdir -p reports
          cp target/spotbugsXml.xml reports/spotbugs-report.xml || echo "<empty/>" > reports/spotbugs-report.xml

      - name: Run Full Scan
        if: matrix.scan == 'fullscan'
        run: |
          mkdir -p reports
          REPORT=reports/full-code-scan.txt
          echo "Full Scan" > $REPORT
          grep -R "password" . >> $REPORT || true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.scan }}
          path: reports/

  # 🔹 Stage 3: Final HTML Report (Child Aggregator)
  html-report:
    runs-on: ubuntu-latest
    needs: security-scans

    steps:
      - uses: actions/checkout@v4

      - name: Download All Reports
        uses: actions/download-artifact@v4

      # ✅ Generate HTML Report
      - name: Generate HTML Report
        run: |
          mkdir -p public
          REPORT=public/security-report.html

          OWASP_COUNT=$(jq '[.dependencies[].vulnerabilities | length] | add' owasp/owasp-report.json 2>/dev/null || echo 0)
          SPOTBUGS_COUNT=$(grep -c "<BugInstance" spotbugs/spotbugs-report.xml 2>/dev/null || echo 0)
          FULL_SCAN_COUNT=$(wc -l fullscan/full-code-scan.txt 2>/dev/null | awk '{print $1}' || echo 0)

          echo "<html><head><title>Security Dashboard</title></head><body>" > $REPORT
          echo "<h1>🚨 Security Dashboard</h1>" >> $REPORT

          echo "<table border='1'><tr><th>Type</th><th>Count</th></tr>" >> $REPORT
          echo "<tr><td>OWASP</td><td>$OWASP_COUNT</td></tr>" >> $REPORT
          echo "<tr><td>SpotBugs</td><td>$SPOTBUGS_COUNT</td></tr>" >> $REPORT
          echo "<tr><td>Code Scan</td><td>$FULL_SCAN_COUNT</td></tr>" >> $REPORT
          echo "</table>" >> $REPORT

          echo "</body></html>" >> $REPORT

      # ✅ Upload HTML for download
      - name: Upload HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-html-report
          path: public/security-report.html

      # ✅ Setup Pages (NO enablement, NO token)
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ✅ Upload for Pages
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # ✅ Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ✅ Output URL
      - name: Show Report URL
        run: |
          echo "🌐 Live Report:"
          echo "${{ steps.deployment.outputs.page_url }}/security-report.html"
