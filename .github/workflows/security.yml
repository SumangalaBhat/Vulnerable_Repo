name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:

  # 🔹 Stage 1: Build
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests

  # 🔹 Stage 2: Git Metadata (Commit + PR Info)
  git-info:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Capture Commit Details
        run: |
          mkdir -p reports
          echo "Author: $(git log -1 --pretty=format:'%an')" > reports/git-info.txt
          echo "Email: $(git log -1 --pretty=format:'%ae')" >> reports/git-info.txt
          echo "Message: $(git log -1 --pretty=format:'%s')" >> reports/git-info.txt
          echo "Commit ID: $(git log -1 --pretty=format:'%H')" >> reports/git-info.txt

      - name: Capture PR Changed Files
        run: |
          git fetch origin main || true
          git diff --name-only origin/main...HEAD > reports/changed-files.txt || true

      - name: Upload Git Metadata
        uses: actions/upload-artifact@v4
        with:
          name: git-info
          path: reports/

  # 🔹 Stage 3: OWASP Dependency Scan
  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Save OWASP Report
        run: |
          mkdir -p reports
          cp target/dependency-check-report/dependency-check-report.json reports/owasp-report.json || echo "{}" > reports/owasp-report.json

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/owasp-report.json

  # 🔹 Stage 4: SpotBugs Scan
  spotbugs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        run: mvn clean install -DskipTests

      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      - name: Save SpotBugs Report
        run: |
          mkdir -p reports
          cp target/spotbugsXml.xml reports/spotbugs-report.xml || echo "<empty/>" > reports/spotbugs-report.xml

      - name: Upload SpotBugs Report
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: reports/spotbugs-report.xml

  # 🔹 Stage 5: Full Repository Code Vulnerability Scan
  full-code-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan Entire Repository
        run: |
          mkdir -p reports
          REPORT=reports/full-code-scan.txt

          echo "========== FULL REPO CODE SCAN ==========" > $REPORT

          echo "\n[SQL Injection Patterns]" >> $REPORT
          grep -R "Statement" . >> $REPORT || true

          echo "\n[Command Injection]" >> $REPORT
          grep -R "Runtime.getRuntime()" . >> $REPORT || true

          echo "\n[Hardcoded Secrets]" >> $REPORT
          grep -R -i "password" . >> $REPORT || true

          echo "\n[Path Traversal]" >> $REPORT
          grep -R "FileReader" . >> $REPORT || true

      - name: Upload Full Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: full-code-scan
          path: reports/full-code-scan.txt

  # 🔹 Stage 6: Final Text Report
  final-report:
    runs-on: ubuntu-latest
    needs: [git-info, dependency-check, spotbugs, full-code-scan]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      - name: Generate Combined Report
        run: |
          mkdir -p final-report
          REPORT=final-report/security-summary.txt

          echo "========== FINAL SECURITY REPORT ==========" > $REPORT

          echo "\n--- Git Info ---" >> $REPORT
          cat git-info/git-info.txt >> $REPORT || true

          echo "\n--- Changed Files ---" >> $REPORT
          cat git-info/changed-files.txt >> $REPORT || true

          echo "\n--- OWASP ---" >> $REPORT
          cat owasp-report/owasp-report.json >> $REPORT || true

          echo "\n--- SpotBugs ---" >> $REPORT
          cat spotbugs-report/spotbugs-report.xml >> $REPORT || true

          echo "\n--- Full Code Scan ---" >> $REPORT
          cat full-code-scan/full-code-scan.txt >> $REPORT || true

      - name: Upload Final Text Report
        uses: actions/upload-artifact@v4
        with:
          name: final-security-report
          path: final-report/security-summary.txt

  # 🔹 Stage 7: HTML Dashboard (Enhanced)
  html-report:
    runs-on: ubuntu-latest
    needs: final-report

    steps:
      # Step 1: Download artifacts
      - name: Download All Artifacts
        uses: actions/download-artifact@v4

      # Step 2: Generate HTML Dashboard with Table
      - name: Generate HTML Dashboard
        run: |
          mkdir -p final-report
          REPORT=final-report/security-report.html

          # ---- Extract counts ----
          OWASP_COUNT=$(jq '[.dependencies[].vulnerabilities | length] | add' owasp-report/owasp-report.json 2>/dev/null || echo 0)
          SPOTBUGS_COUNT=$(grep -c "<BugInstance" spotbugs-report/spotbugs-report.xml 2>/dev/null || echo 0)
          FULL_SCAN_COUNT=$(grep -c ":" full-code-scan/full-code-scan.txt 2>/dev/null || echo 0)

          # ---- HTML Start ----
          echo "<html><head><title>Security Dashboard</title>" > $REPORT
          echo "<style>
          body { font-family: Arial; margin: 20px; }
          h1 { color: #2c3e50; }
          table { border-collapse: collapse; width: 60%; margin-bottom: 20px; }
          th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
          th { background-color: #2c3e50; color: white; }
          tr:nth-child(even) { background-color: #f2f2f2; }
          .high { color: red; font-weight: bold; }
          .medium { color: orange; }
          .low { color: green; }
          pre { background: #f4f4f4; padding: 10px; overflow-x: auto; }
          </style></head><body>" >> $REPORT

          echo "<h1>🚨 Security Dashboard</h1>" >> $REPORT

          # ---- Summary Table ----
          echo "<h2>📊 Vulnerability Summary</h2>" >> $REPORT
          echo "<table>" >> $REPORT
          echo "<tr><th>Scan Type</th><th>Vulnerability Count</th></tr>" >> $REPORT
          echo "<tr><td>OWASP Dependency Check</td><td class='high'>$OWASP_COUNT</td></tr>" >> $REPORT
          echo "<tr><td>SpotBugs</td><td class='medium'>$SPOTBUGS_COUNT</td></tr>" >> $REPORT
          echo "<tr><td>Full Code Scan</td><td class='low'>$FULL_SCAN_COUNT</td></tr>" >> $REPORT
          echo "</table>" >> $REPORT

          # ---- Git Info ----
          echo "<h2>👤 Git Info</h2><pre>" >> $REPORT
          cat git-info/git-info.txt >> $REPORT || true
          echo "</pre>" >> $REPORT

          # ---- Changed Files ----
          echo "<h2>🔀 Changed Files</h2><pre>" >> $REPORT
          cat git-info/changed-files.txt >> $REPORT || true
          echo "</pre>" >> $REPORT

          # ---- Detailed Sections ----
          echo "<h2>OWASP Vulnerabilities</h2><pre>" >> $REPORT
          cat owasp-report/owasp-report.json >> $REPORT || true
          echo "</pre>" >> $REPORT

          echo "<h2>SpotBugs Findings</h2><pre>" >> $REPORT
          cat spotbugs-report/spotbugs-report.xml >> $REPORT || true
          echo "</pre>" >> $REPORT

          echo "<h2>Full Code Scan</h2><pre>" >> $REPORT
          cat full-code-scan/full-code-scan.txt >> $REPORT || true
          echo "</pre>" >> $REPORT

          echo "</body></html>" >> $REPORT

      # Step 3: Print clickable link in logs
      - name: Print Report Path
        run: |
          echo "✅ HTML Report generated at:"
          echo "final-report/security-report.html"
          echo "⬇️ Download it from the Artifacts section: security-html-dashboard"

      # Step 4: Upload artifact (visible in UI)
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: security-html-dashboard
          path: final-report/security-report.html

