name: Java Security Pipeline

on:
  push:
  pull_request:

jobs:

  # 🔹 Stage 1: Checkout and Build
  build:
    runs-on: ubuntu-latest
    outputs:
      build-success: ${{ steps.build-step.outcome }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Build Project
        id: build-step
        run: mvn clean install -DskipTests

  # 🔹 Stage 2: OWASP Dependency Check
  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Run OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          dependency-check.sh \
            --project "test" \
            --scan . \
            --format JSON \
            --out target/dependency-check-report \
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Print Dependency Check Report
        run: |
          REPORT_FILE="target/dependency-check-report/dependency-check-report.json"
          echo "========== OWASP REPORT =========="
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
          else
            echo "No report generated (NVD feed unreachable)"
          fi

      - name: Count Vulnerabilities
        run: |
          REPORT_FILE="target/dependency-check-report/dependency-check-report.json"
          if [ -f "$REPORT_FILE" ]; then
            COUNT=$(jq '.dependencies[].vulnerabilities | length' "$REPORT_FILE" | awk '{sum+=$1} END {print sum}')
            echo "Total vulnerabilities: $COUNT"
          else
            echo "Total vulnerabilities: 0"
          fi

  # 🔹 Stage 3: SpotBugs Analysis
  spotbugs:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 11

      - name: Run SpotBugs
        run: mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

      - name: Print SpotBugs Report
        run: |
          REPORT_FILE="target/spotbugsXml.xml"
          echo "========== SPOTBUGS REPORT =========="
          if [ -f "$REPORT_FILE" ]; then
            cat "$REPORT_FILE"
          else
            echo "No report generated"
          fi

  # 🔹 Stage 4: Custom Code Scan
  custom-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Custom Code Scan
        run: |
          echo "========== CUSTOM SCAN =========="
          echo "SQL Injection:"
          grep -R "Statement" src || true
          echo "Command Injection:"
          grep -R "Runtime.getRuntime()" src || true
          echo "Hardcoded Password:"
          grep -R "root123" . || true
          echo "Path Traversal:"
          grep -R "FileReader" src || true
