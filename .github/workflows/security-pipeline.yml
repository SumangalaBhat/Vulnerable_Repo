name: Java Vulnerability Scan Pipeline

on:
  push:
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Step 1: Checkout source code
    - name: Checkout Source Code
      uses: actions/checkout@v3

    # 🔹 Step 2: Setup Java
    - name: Setup Java 11
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '11'

    # 🔹 Step 3: Build the application
    - name: Build with Maven
      run: mvn clean install -DskipTests

    # 🔹 Step 4: Run Dependency Vulnerability Scan (OWASP)
    - name: Run OWASP Dependency Check
      run: |
        echo "Running OWASP Dependency Check..."
        mvn org.owasp:dependency-check-maven:check \
          -Dformat=JSON \
          -DoutputDirectory=dependency-check-report || true

    # 🔹 Step 5: Print OWASP Report in Logs
    - name: Print OWASP Vulnerabilities
      run: |
        echo "========== OWASP Vulnerability Report =========="
        cat dependency-check-report/dependency-check-report.json || echo "No report found"

    # 🔹 Step 6: Extract Vulnerability Count
    - name: Count OWASP Vulnerabilities
      run: |
        COUNT=$(jq '.dependencies[].vulnerabilities | length' dependency-check-report/dependency-check-report.json | awk '{sum+=$1} END {print sum}')
        echo "Total OWASP vulnerabilities: $COUNT"

        if [ "$COUNT" -gt 0 ]; then
          echo "❌ Vulnerabilities detected in dependencies"
        else
          echo "✅ No dependency vulnerabilities"
        fi

    # 🔹 Step 7: Run SAST (SpotBugs)
    - name: Run SpotBugs Scan
      run: |
        echo "Running SpotBugs..."
        mvn com.github.spotbugs:spotbugs-maven-plugin:spotbugs || true

    # 🔹 Step 8: Print SpotBugs Report
    - name: Print SpotBugs Report
      run: |
        echo "========== SpotBugs Report =========="
        cat target/spotbugsXml.xml || echo "No SpotBugs report found"

    # 🔹 Step 9: Run Basic Grep Checks (Custom Vulnerability Detection)
    - name: Custom Code Vulnerability Checks
      run: |
        echo "========== Custom Vulnerability Scan =========="

        echo "Checking for SQL Injection patterns..."
        grep -R "Statement" src || true

        echo "Checking for Command Injection..."
        grep -R "Runtime.getRuntime()" src || true

        echo "Checking for Hardcoded Passwords..."
        grep -R "password" src || true

        echo "Checking for File Read जोखिम..."
        grep -R "Files.readAllBytes" src || true

    # 🔹 Step 10: Final Fail Condition
    - name: Fail Build if Vulnerabilities Found
      run: |
        COUNT=$(jq '.dependencies[].vulnerabilities | length' dependency-check-report/dependency-check-report.json | awk '{sum+=$1} END {print sum}')

        if [ "$COUNT" -gt 0 ]; then
          echo "❌ Build failed due to vulnerabilities"
          exit 1
        else
          echo "✅ Build passed"
        fi
